# workflow para notificar a un bot de telegram cambios subidos al repositorio.
name: Notificación Telegram

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout completo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Trae los 2 últimos commits para poder comparar

      - name: Obtener archivos modificados
        id: changed
        run: |
          # Comprobamos si HEAD^ existe (si hay más de un commit en el historial)
          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            files=$(git diff --name-only --diff-filter=ACMRT HEAD^ HEAD | sed 's/^/- /')
          else
            # Si es el primer commit, listamos todos los archivos del repositorio
            files=$(git ls-files | sed 's/^/- /')
          fi

          if [ -z "$files" ]; then
            files="(No se detectaron archivos modificados)"
          fi

          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$files" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Notificar push a Telegram
        run: |
          msg=$(cat << 'EOF'
          <b>TSI-TFG — nuevo push</b>
          <b>Rama:</b> ${{ github.ref_name }}
          <b>Autor:</b> ${{ github.actor }}
          <b>Mensaje:</b> ${{ github.event.head_commit.message }}
          <b>Commit:</b> <code>${{ github.sha }}</code>
          
          <b>Archivos modificados:</b>
          ${{ steps.changed.outputs.files }}
          
          🔗 <a href="${{ github.event.head_commit.url }}">Ver commit</a>
          EOF
          )
          
          # Hacemos el POST enviando el texto correctamente codificado para URLs
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TOKEN_TELEGRAM_BOT }}/sendMessage" \
            -d chat_id="${{ secrets.CHAT_ID_TELEGRAM }}" \
            -d parse_mode="HTML" \
            --data-urlencode "text=${msg}"
